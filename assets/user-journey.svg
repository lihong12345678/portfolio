<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Inter','JetBrains Mono',monospace">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#FAFAFA"/>

  <!-- 标题 -->
  <text x="40" y="48" fill="#C8553D" font-size="12" letter-spacing="0.08" font-weight="500">USER JOURNEY MAP</text>
  <text x="40" y="72" fill="#0A0A0A" font-size="20" font-weight="400">用户旅程图 · 业务操作员</text>

  <!-- 阶段标签 -->
  <text x="160" y="120" fill="#0A0A0A" font-size="11" letter-spacing="0.06" font-weight="500" text-anchor="middle">登录系统</text>
  <text x="310" y="120" fill="#0A0A0A" font-size="11" letter-spacing="0.06" font-weight="500" text-anchor="middle">表单填写</text>
  <text x="460" y="120" fill="#0A0A0A" font-size="11" letter-spacing="0.06" font-weight="500" text-anchor="middle">数据查询</text>
  <text x="610" y="120" fill="#0A0A0A" font-size="11" letter-spacing="0.06" font-weight="500" text-anchor="middle">审批处理</text>
  <text x="720" y="120" fill="#0A0A0A" font-size="11" letter-spacing="0.06" font-weight="500" text-anchor="middle">导出报表</text>

  <!-- 阶段分隔线 -->
  <line x1="235" y1="130" x2="235" y2="440" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="385" y1="130" x2="385" y2="440" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="535" y1="130" x2="535" y2="440" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="665" y1="130" x2="665" y2="440" stroke="#E8E8E8" stroke-width="1"/>

  <!-- 满意度轴线 -->
  <text x="40" y="190" fill="#B0B0B0" font-size="9" letter-spacing="0.04">满意</text>
  <text x="40" y="380" fill="#B0B0B0" font-size="9" letter-spacing="0.04">不满</text>
  <line x1="100" y1="380" x2="760" y2="380" stroke="#E8E8E8" stroke-width="1"/>
  <line x1="100" y1="190" x2="760" y2="190" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- 中位线 -->
  <line x1="100" y1="285" x2="760" y2="285" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="2,6"/>

  <!-- 情绪曲线 -->
  <polyline points="160,230 310,360 460,220 610,310 720,190" fill="none" stroke="#C8553D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 数据点 -->
  <circle cx="160" cy="230" r="6" fill="#C8553D"/>
  <circle cx="310" cy="360" r="6" fill="#C8553D"/>
  <circle cx="460" cy="220" r="6" fill="#C8553D"/>
  <circle cx="610" cy="310" r="6" fill="#C8553D"/>
  <circle cx="720" cy="190" r="6" fill="#C8553D"/>

  <!-- 情绪标注 -->
  <text x="160" y="215" fill="#0A0A0A" font-size="10" text-anchor="middle">快速上手</text>
  <text x="310" y="375" fill="#C8553D" font-size="10" text-anchor="middle">⚠ 风格混乱</text>
  <text x="460" y="205" fill="#0A0A0A" font-size="10" text-anchor="middle">熟悉后顺畅</text>
  <text x="610" y="325" fill="#C8553D" font-size="10" text-anchor="middle">⚠ 操作繁琐</text>
  <text x="720" y="175" fill="#0A0A0A" font-size="10" text-anchor="middle">✓ 目标达成</text>

  <!-- 痛点区域（低谷）高亮 -->
  <rect x="235" y="340" width="150" height="40" rx="2" fill="#C8553D" opacity="0.08"/>
  <rect x="535" y="290" width="130" height="30" rx="2" fill="#C8553D" opacity="0.08"/>

  <!-- 底部：触点与行为 -->
  <line x1="100" y1="400" x2="760" y2="400" stroke="#E8E8E8" stroke-width="1"/>
  <text x="40" y="420" fill="#B0B0B0" font-size="9" letter-spacing="0.04">触点</text>

  <text x="160" y="425" fill="#6B6B6B" font-size="10" text-anchor="middle">登录页</text>
  <text x="160" y="445" fill="#B0B0B0" font-size="9" text-anchor="middle">3 步完成</text>

  <text x="310" y="425" fill="#6B6B6B" font-size="10" text-anchor="middle">表单组件</text>
  <text x="310" y="445" fill="#C8553D" font-size="9" text-anchor="middle">风格不一致</text>

  <text x="460" y="425" fill="#6B6B6B" font-size="10" text-anchor="middle">筛选器</text>
  <text x="460" y="445" fill="#B0B0B0" font-size="9" text-anchor="middle">交互统一</text>

  <text x="610" y="425" fill="#6B6B6B" font-size="10" text-anchor="middle">审批流程</text>
  <text x="610" y="445" fill="#C8553D" font-size="9" text-anchor="middle">步骤过多</text>

  <text x="720" y="425" fill="#6B6B6B" font-size="10" text-anchor="middle">导出按钮</text>
  <text x="720" y="445" fill="#B0B0B0" font-size="9" text-anchor="middle">一键完成</text>
</svg>